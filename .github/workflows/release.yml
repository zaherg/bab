name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: macos-latest
            platform: darwin
            arch: arm64
          - runner: macos-15-intel
            platform: darwin
            arch: x64
          - runner: ubuntu-latest
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64

    runs-on: ${{ matrix.runner }}
    name: build-${{ matrix.platform }}-${{ matrix.arch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bundle plugins
        run: bun run scripts/bundle-plugins.ts

      - name: Compile binary
        run: bun build --compile src/cli.ts --outfile bab-${{ matrix.platform }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bab-${{ matrix.platform }}-${{ matrix.arch }}
          path: bab-${{ matrix.platform }}-${{ matrix.arch }}
          if-no-files-found: error

  release:
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Generate checksums
        run: shasum -a 256 bab-* > checksums.sha256

      - name: Determine pre-release
        id: meta
        run: |
          if echo "$GITHUB_REF_NAME" | grep -qE '(beta|rc|[0-9]{8})'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          make_latest: ${{ steps.meta.outputs.prerelease != 'true' }}
          files: |
            bab-*
            checksums.sha256
